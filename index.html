<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAF 파이 이벤트</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #17202f;
      --muted: #657083;
      --line: #dce3ee;
      --brand: #176b87;
      --brand-dark: #0f4d62;
      --ok: #15803d;
      --ok-bg: #e9f8ee;
      --x: #b42318;
      --x-bg: #fff0ee;
      --shadow: 0 18px 50px rgba(28, 45, 74, 0.14);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(145deg, rgba(23, 107, 135, 0.14), transparent 36%),
        linear-gradient(315deg, rgba(239, 108, 77, 0.12), transparent 34%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .count {
      min-width: 164px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .count strong {
      display: block;
      font-size: 42px;
      line-height: 1;
      color: var(--ok);
    }

    .count span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 390px) 1fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .form-panel {
      padding: 24px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 17px;
    }

    .settings {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .settings-title {
      margin: 0 0 14px;
      color: #2f3c4f;
      font-size: 15px;
      font-weight: 900;
    }

    .number-fields {
      display: grid;
      gap: 12px;
      margin-bottom: 17px;
    }

    label {
      color: #2f3c4f;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid #c9d3e2;
      border-radius: 8px;
      padding: 0 14px;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(23, 107, 135, 0.14);
    }

    .submit {
      width: 100%;
      height: 50px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--brand);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .submit:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .result {
      display: none;
      margin-top: 18px;
      padding: 17px;
      border-radius: 8px;
      font-weight: 800;
      text-align: center;
    }

    .result.show {
      display: block;
    }

    .result.ok {
      color: var(--ok);
      background: var(--ok-bg);
      border: 1px solid #bfe9ca;
    }

    .result.no {
      color: var(--x);
      background: var(--x-bg);
      border: 1px solid #ffd1cb;
    }

    .list-panel {
      overflow: hidden;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .clear {
      height: 36px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0 12px;
      color: #344256;
      background: #fff;
      cursor: pointer;
    }

    .clear:hover {
      border-color: #98a8bc;
      background: #f8fafc;
    }

    .records {
      display: grid;
      max-height: 560px;
      overflow: auto;
    }

    .record {
      display: grid;
      grid-template-columns: minmax(100px, 0.8fr) minmax(130px, 1.2fr) 70px 132px 42px;
      gap: 12px;
      align-items: center;
      min-height: 62px;
      padding: 12px 20px;
      border-bottom: 1px solid #edf1f7;
    }

    .record:last-child {
      border-bottom: 0;
    }

    .name {
      min-width: 0;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .number,
    .values,
    .time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .values {
      overflow-wrap: anywhere;
    }

    .badge {
      justify-self: start;
      min-width: 42px;
      border-radius: 999px;
      padding: 5px 11px;
      font-weight: 900;
      text-align: center;
    }

    .badge.ok {
      color: var(--ok);
      background: var(--ok-bg);
    }

    .badge.no {
      color: var(--x);
      background: var(--x-bg);
    }

    .delete-record {
      width: 36px;
      height: 36px;
      border: 1px solid #ffd1cb;
      border-radius: 8px;
      color: var(--x);
      background: #fff8f7;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .delete-record:hover {
      border-color: #f5a59b;
      background: var(--x-bg);
      transform: translateY(-1px);
    }

    .empty {
      padding: 56px 20px;
      color: var(--muted);
      text-align: center;
    }

    .hint {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 24px, 560px);
        padding: 28px 0;
      }

      .topbar,
      .layout {
        grid-template-columns: 1fr;
        display: grid;
      }

      .count {
        text-align: left;
      }

      .record {
        grid-template-columns: 1fr 68px 42px;
        gap: 6px 12px;
      }

      .number,
      .values,
      .time {
        grid-column: 1 / 2;
      }

      .badge {
        grid-row: 1 / 3;
        grid-column: 2 / 3;
        justify-self: end;
      }

      .delete-record {
        grid-row: 1 / 3;
        grid-column: 3 / 4;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="요약">
      <div>
        <h1>SAF 파이 이벤트</h1>
        <p class="subtitle">이름과 도전값을 입력하면 3.09 - 3.19 범위 안은 O로 기록됩니다.</p>
      </div>
      <div class="count" aria-live="polite">
        <strong id="okCount">0</strong>
        <span>O 판정 인원</span>
      </div>
    </section>

    <section class="layout">
      <form class="panel form-panel" id="judgeForm">
        <section class="settings" aria-label="설정">
          <p class="settings-title">설정</p>
          <div class="field">
            <label for="attemptCountInput">한 사람당 도전 횟수</label>
            <input id="attemptCountInput" type="number" min="1" max="20" step="1" value="1">
          </div>
        </section>
        <div class="field">
          <label for="nameInput">이름</label>
          <input id="nameInput" name="name" type="text" autocomplete="name" placeholder="예: 김하늘" required>
        </div>
        <div class="number-fields" id="numberFields"></div>
        <button class="submit" type="submit">판정하고 저장</button>
        <p class="hint">입력값 중 하나라도 3.09 이상 3.19 이하이면 O로 처리합니다.</p>
        <div class="result" id="latestResult" aria-live="polite"></div>
      </form>

      <section class="panel list-panel" aria-label="저장된 기록">
        <div class="list-head">
          <h2>저장된 기록</h2>
          <button class="clear" id="clearButton" type="button">전체 삭제</button>
        </div>
        <div class="records" id="records"></div>
      </section>
    </section>
  </main>

  <script>
    const MIN_VALUE = 3.09;
    const MAX_VALUE = 3.19;

    const form = document.querySelector("#judgeForm");
    const nameInput = document.querySelector("#nameInput");
    const attemptCountInput = document.querySelector("#attemptCountInput");
    const numberFields = document.querySelector("#numberFields");
    const latestResult = document.querySelector("#latestResult");
    const recordsEl = document.querySelector("#records");
    const okCountEl = document.querySelector("#okCount");
    const clearButton = document.querySelector("#clearButton");

    let records = [];
    let attemptCount = 1;

    function normalizeAttemptCount(value) {
      const parsedValue = Number.parseInt(value, 10);
      if (Number.isNaN(parsedValue)) {
        return 1;
      }

      return Math.min(20, Math.max(1, parsedValue));
    }

    function renderNumberFields() {
      attemptCountInput.value = attemptCount;
      numberFields.innerHTML = Array.from({ length: attemptCount }, (_, index) => `
        <div class="field">
          <label for="numberInput${index + 1}">도전값 ${index + 1}</label>
          <input id="numberInput${index + 1}" class="number-input" name="number${index + 1}" type="number" inputmode="decimal" step="0.01" placeholder="예: 3.14" required>
        </div>
      `).join("");
    }

    function isOk(value) {
      return value >= MIN_VALUE && value <= MAX_VALUE;
    }

    function formatTime(isoDate) {
      return new Intl.DateTimeFormat("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(isoDate));
    }

    function render() {
      const okCount = records.filter((record) => record.result === "O").length;
      okCountEl.textContent = okCount;
      clearButton.disabled = records.length === 0;

      if (records.length === 0) {
        recordsEl.innerHTML = '<div class="empty">아직 저장된 기록이 없습니다.</div>';
        return;
      }

      recordsEl.innerHTML = records.map((record) => {
        const badgeClass = record.result === "O" ? "ok" : "no";
        return `
          <article class="record">
            <div class="name">${escapeHtml(record.name)}</div>
            <div class="values">${record.values.map((value) => value.toFixed(2)).join(", ")}</div>
            <div class="badge ${badgeClass}">${record.result}</div>
            <time class="time" datetime="${record.createdAt}">${formatTime(record.createdAt)}</time>
            <button class="delete-record" type="button" data-id="${record.id}" aria-label="${escapeHtml(record.name)} 기록 삭제" title="기록 삭제">×</button>
          </article>
        `;
      }).join("");
    }

    async function loadInitialData() {
      try {
        const [settingsResponse, recordsResponse] = await Promise.all([
          fetch("/api/settings"),
          fetch("/api/records")
        ]);

        if (!settingsResponse.ok || !recordsResponse.ok) {
          throw new Error("초기 데이터를 불러오지 못했습니다.");
        }

        const settingsData = await settingsResponse.json();
        const recordsData = await recordsResponse.json();

        attemptCount = normalizeAttemptCount(settingsData.attemptCount);
        records = recordsData.records;
        renderNumberFields();
        render();
      } catch (error) {
        showMessage(error.message || "DB 연결에 실패했습니다.", false);
      }
    }

    function showMessage(message, isOkResult) {
      latestResult.className = `result show ${isOkResult ? "ok" : "no"}`;
      latestResult.textContent = message;
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const name = nameInput.value.trim();
      const values = Array.from(document.querySelectorAll(".number-input")).map((input) => Number(input.value));

      if (!name || values.some((value) => Number.isNaN(value))) {
        return;
      }

      try {
        const response = await fetch("/api/records", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, values })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || "기록 저장에 실패했습니다.");
        }

        const data = await response.json();
        records = [data.record, ...records];
        render();

        showMessage(`${name}님은 ${data.record.result}입니다.`, data.record.result === "O");
        form.reset();
        attemptCountInput.value = attemptCount;
        renderNumberFields();
        nameInput.focus();
      } catch (error) {
        showMessage(error.message || "기록 저장에 실패했습니다.", false);
      }
    });

    attemptCountInput.addEventListener("change", async () => {
      attemptCount = normalizeAttemptCount(attemptCountInput.value);
      renderNumberFields();

      try {
        const response = await fetch("/api/settings", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ attemptCount })
        });

        if (!response.ok) {
          throw new Error("설정 저장에 실패했습니다.");
        }
      } catch (error) {
        showMessage(error.message || "설정 저장에 실패했습니다.", false);
      }
    });

    clearButton.addEventListener("click", () => {
      if (!records.length) {
        return;
      }

      const shouldClear = confirm("저장된 기록을 모두 삭제할까요?");
      if (!shouldClear) {
        return;
      }

      try {
        const response = await fetch("/api/records", { method: "DELETE" });
        if (!response.ok) {
          throw new Error("전체 삭제에 실패했습니다.");
        }

        records = [];
        latestResult.className = "result";
        latestResult.textContent = "";
        render();
      } catch (error) {
        showMessage(error.message || "전체 삭제에 실패했습니다.", false);
      }
    });

    recordsEl.addEventListener("click", async (event) => {
      const deleteButton = event.target.closest(".delete-record");
      if (!deleteButton) {
        return;
      }

      const shouldDelete = confirm("이 기록을 삭제할까요?");
      if (!shouldDelete) {
        return;
      }

      try {
        const response = await fetch(`/api/records/${deleteButton.dataset.id}`, {
          method: "DELETE"
        });

        if (!response.ok) {
          throw new Error("기록 삭제에 실패했습니다.");
        }

        records = records.filter((record) => record.id !== deleteButton.dataset.id);
        render();
      } catch (error) {
        showMessage(error.message || "기록 삭제에 실패했습니다.", false);
      }
    });

    renderNumberFields();
    render();
    loadInitialData();
  </script>
</body>
</html>
